<!-- navbar.html -->

<nav class="navbar">
    <div class="nav-container">

        <!-- LEFT -->
        <div class="left">
            <span class="hamburger" onclick="toggleMenu()">☰</span>
            <a href="/" class="logo">StudyBud 🚀</a>
        </div>

        <!-- CENTER (Search) -->
        <div class="search-box">
        <form action="{% url 'home' %}" method="GET" class="search-box">
             <input type="text" name="q" value="{{ request.GET.q }}" placeholder="Search rooms..." />
          <button type="submit">Search</button>
        </form>
        </div>

        <!-- RIGHT -->
        <div class="right" id="navMenu">

            <a href="/">Home</a>
            <a href="/topics/">Topics</a>
            <a href="/rooms/">Rooms</a>

            <!-- Notification -->
            <span class="bell">🔔</span>

            <!-- Dark Mode -->
            <button onclick="toggleDarkMode()" class="dark-btn">🌙</button>

            {% if request.user.is_authenticated %}
                <span class="user">Hi, {{ request.user.username }}</span>
                <a href="{% url 'profile' %}">Profile</a>
                <a href="{% url 'logout' %}" class="logout">Logout</a>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'register' %}" class="signup">Signup</a>
            {% endif %}
        </div>

    </div>
</nav>

<style>

/* NAVBAR */
.navbar {
    background: #111827;
    padding: 12px 20px;
    color: white;
}

/* FLEX */
.nav-container {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

/* LEFT */
.left {
    display: flex;
    align-items: center;
}

.logo {
    margin-left: 10px;
    font-size: 20px;
    font-weight: bold;
    color: white;
    text-decoration: none;
}

/* SEARCH */
.search-box input {
    padding: 6px 12px;
    border-radius: 6px;
    border: none;
    outline: none;
}

/* RIGHT */
.right a {
    margin-left: 15px;
    color: #d1d5db;
    text-decoration: none;
}

.right a:hover {
    color: #60a5fa;
}

/* BUTTONS */
.signup {
    background: #4f46e5;
    padding: 5px 10px;
    border-radius: 5px;
    color: white !important;
}

.logout {
    color: #f87171 !important;
}

/* ICONS */
.bell {
    margin-left: 15px;
    cursor: pointer;
}

.dark-btn {
    margin-left: 10px;
    cursor: pointer;
    border: none;
    background: transparent;
    color: white;
}

/* USER */
.user {
    margin-left: 10px;
    color: #9ca3af;
}

/* HAMBURGER */
.hamburger {
    display: none;
    font-size: 20px;
    cursor: pointer;
}

/* MOBILE */
@media (max-width: 768px) {

    .search-box {
        display: none;
    }

    .hamburger {
        display: block;
        font-size: 24px;
    }

    .right {
        display: flex;
        flex-direction: column;
        position: fixed;
        top: 0;
        right: -280px;   /* hidden */
        width: 250px;
        height: 100vh;
        background: #111827;
        padding-top: 80px;
        transition: 0.3s ease;
        z-index: 1000;
    }

    .right.active {
        right: 0;
    }

    .right a,
    .user,
    .bell,
    .dark-btn {
        margin: 12px 20px;
    }
}

/* DARK MODE */
.dark-btn {
    background: none;
    border: none;
    color: white;
    cursor: pointer;
    font-size: 22px;
    padding: 10px;
    margin: 0;
    text-align: left;
}
.right .dark-btn{
    margin: 12px 20px;
}
body.dark-mode {
    background: #0f172a;
    color: white;
}

body.dark-mode .navbar {
    background: #020617;
}

body.dark-mode .hero {
    background: linear-gradient(135deg, #1e1b4b, #581c87);
}

body.dark-mode .room-card {
    background: rgba(15, 23, 42, 0.8);
    color: white;
}

body.dark-mode .sidebar {
    background: #111827;
}

body.dark-mode a {
    color: #e2e8f0;
}

body.dark-mode input {
    background: #1e293b;
    color: white;
    border: 1px solid #334155;
}

</style>

<script>

/* MOBILE MENU */
function toggleDarkMode() {
    document.body.classList.toggle("dark-mode");
}
function toggleMenu() {
    document.getElementById("navMenu").classList.toggle("active");
}

document.addEventListener("click", function(e) {
    const menu = document.getElementById("navMenu");
    const hamburger = document.querySelector(".hamburger");

    if (
        !menu.contains(e.target) &&
        !hamburger.contains(e.target)
    ) {
        menu.classList.remove("active");
    }
});

</script>
