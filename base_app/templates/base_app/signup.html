{% extends 'base_app/main.html' %}

{% block content %}

<style>
body {
    background: #0f0f0f;
    font-family: 'Segoe UI', sans-serif;
}

/* GRID BACKGROUND */
.bg-grid {
    position: fixed;
    width: 100%;
    height: 100%;
    background-image: 
        linear-gradient(#ff000033 1px, transparent 1px),
        linear-gradient(90deg, #ff000033 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: -1;
}

/* CARD */
.signup-container {
    width: 350px;
    margin: 80px auto;
    padding: 30px;
    background: #1a1a1a;
    border-radius: 10px;
    box-shadow: 0 0 20px rgba(255,0,0,0.2);
    text-align: center;
}

/* TITLE */
.signup-container h2 {
    color: red;
    margin-bottom: 20px;
    letter-spacing: 2px;
}

/* INPUTS */
.form-group {
    margin-bottom: 15px;
    text-align: left;
}

.form-group input {
    width: 100%;
    padding: 10px;
    border-radius: 5px;
    border: none;
    background: #2a2a2a;
    color: white;
    outline: none;
}

/* BUTTON */
.signup-btn {
    width: 100%;
    padding: 10px;
    background: red;
    color: white;
    border: none;
    border-radius: 5px;
    margin-top: 10px;
    cursor: pointer;
    transition: 0.3s;
}

.signup-btn:hover {
    background: #cc0000;
}

/* LINKS */
.extra {
    margin-top: 15px;
    color: #aaa;
}

.extra a {
    color: red;
    text-decoration: none;
    font-weight: bold;
}

.extra a:hover {
    text-decoration: underline;
}
</style>

<div class="bg-grid"></div>

<div class="signup-container">
    <h2>SIGN UP</h2>

    {% if messages %}
        {% for message in messages %}
            <p style="color:red;">{{ message }}</p>
        {% endfor %}
    {% endif %}

    <form id="signupForm">

        <div class="form-group">
            <input type="text" id="username" placeholder="Username" required>
        </div>

        <div class="form-group">
            <input type="email" id="email" placeholder="Email" required>
        </div>

        <div class="form-group">
            <input type="password" id="password1" placeholder="Password" required>
        </div>

        <div class="form-group">
            <input type="password" id="password2" placeholder="Confirm Password" required>
        </div>

        <button type="submit" class="signup-btn">Register</button>
    </form>

    <div class="extra">
        <p>Already have an account? <a href="/login/">Login</a></p>
    </div>
</div>

<script>
document.getElementById('signupForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    const username = document.getElementById('username').value;
    const email = document.getElementById('email').value;
    const password1 = document.getElementById('password1').value;
    const password2 = document.getElementById('password2').value;

    // 🔐 Check passwords match
    if (password1 !== password2) {
        alert("Passwords do not match!");
        return;
    }

    try {
        const response = await fetch('/api/register/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                username: username,
                email: email,
                password: password1
            })
        });

        const data = await response.json();

        if (response.ok) {
            alert("🎉 Account created successfully!");
            window.location.href = "/login/";
        } else {
            console.log(data);
            alert("Error: " + JSON.stringify(data));
        }

    } catch (error) {
        console.error(error);
        alert("Something went wrong!");
    }
});
</script>

{% endblock %}
