{% extends 'base_app/main.html' %}
{% block content %}

<style>
body{
    background:linear-gradient(135deg,#667eea,#764ba2);
    font-family:'Segoe UI',sans-serif;
}

.topics-page{

    max-width:1200px;
    margin:auto;
    padding:40px 20px;

}

.topics-header{

    text-align:center;
    margin-bottom:40px;

}

.topics-header h1{

    color:white;
    font-size:42px;
    margin-bottom:10px;

}

.topics-header p{

    color:#ddd;
    margin-bottom:25px;

}

.topics-header input{

    width:100%;
    max-width:500px;
    padding:15px;
    border:none;
    border-radius:30px;
    outline:none;
    font-size:16px;

}

.topics-grid{

    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:25px;

}

.topic-card{

    background:rgba(255,255,255,.15);
    backdrop-filter:blur(10px);

    border-radius:18px;

    padding:25px;

    display:flex;
    justify-content:space-between;
    align-items:center;

    text-decoration:none;

    color:white;

    transition:.35s;

    box-shadow:0 15px 30px rgba(0,0,0,.15);

}

.topic-card:hover{

    transform:translateY(-8px);

    background:rgba(255,255,255,.22);

}

.topic-left h2{

    margin-bottom:8px;

}

.topic-left small{

    color:#ddd;

}

.topic-right{

    width:45px;
    height:45px;

    border-radius:50%;

    background:white;

    color:#4f46e5;

    display:flex;
    justify-content:center;
    align-items:center;

    font-size:22px;
    font-weight:bold;

}

.no-topic{

    text-align:center;
    color:white;
    font-size:20px;

}

/* Tablet */

@media(max-width:992px){

.topics-grid{

grid-template-columns:repeat(2,1fr);

}

}

/* Mobile */

@media(max-width:768px){

.topics-grid{

grid-template-columns:1fr;

}

.topics-header h1{

font-size:32px;

}

.topic-card{

padding:20px;

}

}
</style>


<div class="topics-page">

    <div class="topics-header">
        <h1>📚 Browse Topics</h1>
        <p>Choose a topic and discover discussion rooms.</p>

        <form method="GET">
            <input
                type="text"
                name="q"
                placeholder="Search topics..."
                value="{{ q }}"
            >
        </form>
    </div>

    <div class="topics-grid">

        {% for topic in topics %}

        <a href="{% url 'home' %}?q={{ topic.name }}" class="topic-card">

            <div class="topic-left">
                <h2>{{ topic.name }}</h2>

                <small>
                    {{ topic.room_count }} Room{{ topic.room_count|pluralize }}
                </small>
            </div>

            <div class="topic-right">
                →
            </div>

        </a>

        {% empty %}

        <div class="no-topic">
            No Topics Found 😢
        </div>

        {% endfor %}

    </div>

</div>

{% endblock %}
