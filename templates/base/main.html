{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudyBud</title>

    <!-- CSS -->
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f1f5f9;
        }

        .container {
            width: 90%;
            margin: auto;
            padding: 20px;
        }

.footer {
    background: #0f172a;
    color: #e5e7eb;
    padding: 40px 20px 20px;
    margin-top: 50px;
}

.footer-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 30px;
    max-width: 1100px;
    margin: auto;
}

.footer h2 {
    color: #ffffff;
}

.footer h4 {
    margin-bottom: 10px;
    color: #c7d2fe;
}

.footer p {
    font-size: 14px;
    opacity: 0.8;
}

.footer a {
    display: block;
    color: #9ca3af;
    text-decoration: none;
    margin-bottom: 6px;
    transition: 0.3s;
}

.footer a:hover {
    color: #6366f1;
    transform: translateX(5px);
}

.footer-bottom {
    text-align: center;
    margin-top: 30px;
    border-top: 1px solid #1f2937;
    padding-top: 15px;
    font-size: 13px;
    opacity: 0.7;
}
    </style>
</head>
<body>

    <!-- Navbar -->
    {% include 'base_app/navbar.html' %}

    <!-- Main Content -->
    <div class="container">
        {% block content %}
        <!-- Page content will come here -->
        {% endblock %}
    </div>

<footer class="footer">
    <div class="footer-container">

        <!-- Logo / Brand -->
        <div class="footer-brand">
            <h2>StudyBud 🚀</h2>
            <p>Connect. Learn. Grow.</p>
        </div>

        <!-- Links -->
        <div class="footer-links">
            <h4>Explore</h4>
            <a href="/">Home</a>
            <a href="/rooms/">Rooms</a>
            <a href="/topics/">Topics</a>
            <a href="/login/">Login</a>
        </div>

        <!-- Social -->
        <div class="footer-social">
            <h4>Follow Us</h4>
            <a href="#">🌐 Website</a>
            <a href="#">🐦 Twitter</a>
            <a href="#">💼 LinkedIn</a>
            <a href="#">📸 Instagram</a>
        </div>

    </div>

    <!-- Bottom -->
    <div class="footer-bottom">
        <p>© 2026 StudyBud. Built with ❤️ using Django</p>
    </div>
</footer>

</body>
</html>
